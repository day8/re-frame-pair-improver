name: ci

# Runs on every push and PR. Smoke-tests the packaged skill metadata,
# version invariants, and release contents.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524bfc483eec58e7f1fce8a755a70587c15 # v5.4.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      - name: SKILL.md frontmatter is populated
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          _, frontmatter, _ = text.split("---", 2)
          fields = {}
          for line in frontmatter.strip().splitlines():
              if ":" in line:
                  key, value = line.split(":", 1)
                  fields[key.strip()] = value.strip()
          assert fields.get("name") == "re-frame-pair-improver", "Frontmatter name must match skill name"
          desc = fields.get("description", "")
          assert desc and "[TODO" not in desc, "Description must be populated"
          print("skill frontmatter ok")
          PY

      - name: Plugin manifest is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"

      - name: Package.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Version metadata agrees
        run: |
          PKG="$(node -p "require('./package.json').version")"
          PLUGIN="$(node -p "require('./.claude-plugin/plugin.json').version")"
          if [ "$PKG" != "$PLUGIN" ]; then
            echo ".claude-plugin/plugin.json version ($PLUGIN) does not match package.json ($PKG)"
            exit 1
          fi

      - name: Packaged files all exist
        run: |
          for f in $(node -e "console.log(require('./package.json').files.join('\n'))"); do
            test -e "$f" || { echo "Missing: $f"; exit 1; }
          done

      - name: Plugin skill entries all exist
        run: |
          for f in $(node -e "console.log(require('./.claude-plugin/plugin.json').skills.map(s => s.replace(/^\.\//, '')).join('\n'))"); do
            test -f "$f" || { echo "Missing skill entry: $f"; exit 1; }
          done
