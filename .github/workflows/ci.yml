name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524bfc483eec58e7f1fce8a755a70587c15
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"

      - name: Validate SKILL.md
        run: |
          python - <<'PY'
          from pathlib import Path
          
          text = Path("SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          _, frontmatter, _ = text.split("---", 2)
          fields = {}
          for line in frontmatter.strip().splitlines():
              if ":" in line:
                  key, value = line.split(":", 1)
                  fields[key.strip()] = value.strip()
          assert fields.get("name") == "re-frame-pair-improver", "Frontmatter name must match skill name"
          desc = fields.get("description", "")
          assert desc and "[TODO" not in desc, "Description must be populated"
          print("skill frontmatter ok")
          PY

      - name: Validate JSON metadata
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
