name: release

# Creates a GitHub release when a semver tag is pushed.
#
# Flow:
#   1. Developer updates version in package.json + .claude-plugin/plugin.json.
#   2. Developer commits and tags: git tag v0.1.0-beta.2 && git push --tags
#   3. This workflow verifies the tag matches package.json version,
#      smoke-tests the packaged metadata, builds an npm tarball, and
#      creates a GitHub release.
#
# npm publish is intentionally deferred until a package install path exists.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@day8"

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing $PKG"

      - name: Verify plugin manifest version matches
        run: |
          PKG="$(node -p "require('./package.json').version")"
          PLUGIN="$(node -p "require('./.claude-plugin/plugin.json').version")"
          if [ "$PKG" != "$PLUGIN" ]; then
            echo ".claude-plugin/plugin.json version ($PLUGIN) does not match package.json ($PKG)"
            exit 1
          fi

      - name: Validate skill frontmatter
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          _, frontmatter, _ = text.split("---", 2)
          fields = {}
          for line in frontmatter.strip().splitlines():
              if ":" in line:
                  key, value = line.split(":", 1)
                  fields[key.strip()] = value.strip()
          assert fields.get("name") == "re-frame-pair-improver", "Frontmatter name must match skill name"
          desc = fields.get("description", "")
          assert desc and "[TODO" not in desc, "Description must be populated"
          print("skill frontmatter ok")
          PY

      - name: Build npm tarball
        run: npm pack

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: "*.tgz"
